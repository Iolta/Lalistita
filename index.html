<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
<title>Lalistita</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f5f0e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Lalistita">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f5f0e8;
    --paper2: #ede8de;
    --ink: #1a1a18;
    --ink2: #3d3d38;
    --muted: #8a8578;
    --rule: #d4cfc4;
    --accent: #2d5a27;
    --red: #8b2020;
    --mono: 'JetBrains Mono', monospace;
    --serif: 'Lora', serif;
    --sidebar: 140px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    height: 100dvh;
  }
  body {
    font-family: var(--mono);
    background: var(--paper);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background-image: repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(180,170,155,0.15) 27px,rgba(180,170,155,0.15) 28px);
  }

  /* ── HEADER ── */
  header {
    background: var(--paper);
    border-bottom: 2px solid var(--ink);
    padding: 12px 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 100;
    flex-shrink: 0;
  }
  .logo {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 600;
    font-size: 1.4rem;
    color: var(--ink);
    line-height: 1;
  }
  .logo::before { content: '# '; font-family: var(--mono); font-style: normal; font-size: 0.9rem; color: var(--muted); font-weight: 300; }

  /* ── STATUS BAR (mapa colapsado) ── */
  #status-bar {
    background: var(--paper2);
    border-bottom: 1px solid var(--rule);
    padding: 7px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.72rem;
    font-family: var(--mono);
    color: var(--muted);
    cursor: pointer;
    transition: background .15s;
    flex-shrink: 0;
    user-select: none;
  }
  #status-bar:active { background: var(--rule); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--rule); border: 1px solid var(--muted); flex-shrink: 0; }
  .dot.active { background: var(--accent); border-color: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  #status-text { flex: 1; }
  #status-expand { font-size: 0.65rem; color: var(--rule); }

  /* ── MAP PANEL (colapsable) ── */
  #map-panel {
    height: 0;
    overflow: hidden;
    transition: height .3s ease;
    position: relative;
    flex-shrink: 0;
    border-bottom: 0px solid var(--ink);
  }
  #map-panel.expanded {
    height: 220px;
    border-bottom-width: 1px;
  }
  #map { width: 100%; height: 100%; }
  .map-overlay {
    position: absolute; inset: 0;
    background: var(--paper2);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; text-align: center; padding: 20px;
  }
  .map-overlay h3 { font-family: var(--serif); font-style: italic; font-size: 1rem; color: var(--ink); }
  .map-overlay pre { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); background: var(--paper); border: 1px solid var(--rule); padding: 8px 14px; border-radius: 4px; text-align: left; line-height: 1.6; }
  .btn-enable { background: var(--ink); color: var(--paper); border: none; border-radius: 3px; padding: 9px 18px; font-family: var(--mono); font-size: 0.8rem; cursor: pointer; }

  /* nearby chips inside map */
  .nearby-list { position: absolute; bottom: 8px; left: 8px; right: 8px; display: flex; gap: 5px; overflow-x: auto; scrollbar-width: none; }
  .nearby-chip { background: rgba(245,240,232,.9); backdrop-filter: blur(4px); border: 1px solid var(--rule); border-radius: 3px; padding: 4px 8px; font-size: 0.7rem; font-family: var(--mono); white-space: nowrap; color: var(--ink2); flex-shrink: 0; }
  .nearby-chip.match { border-color: var(--accent); color: var(--accent); font-weight: 500; }

  /* ── BODY LAYOUT: sidebar + content ── */
  #app-body {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar);
    flex-shrink: 0;
    background: var(--paper2);
    border-right: 1px solid var(--rule);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    scrollbar-width: none;
  }
  #sidebar::-webkit-scrollbar { display: none; }

  .sidebar-label {
    font-size: 0.6rem;
    color: var(--rule);
    padding: 8px 10px 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .sidebar-item {
    padding: 9px 10px;
    font-size: 0.72rem;
    color: var(--muted);
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 7px;
    line-height: 1.2;
  }
  .sidebar-item:active { background: var(--rule); }
  .sidebar-item.active {
    color: var(--ink);
    border-left-color: var(--ink);
    background: var(--paper);
    font-weight: 500;
  }
  .sidebar-item .sym { font-size: 0.9rem; flex-shrink: 0; opacity: 0.7; }
  .sidebar-item.active .sym { opacity: 1; }
  .sidebar-item .s-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar-item .s-badge {
    background: var(--ink);
    color: var(--paper);
    border-radius: 3px;
    min-width: 16px; height: 16px;
    padding: 0 3px;
    font-size: 0.6rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .sidebar-item.active .s-badge { background: var(--accent); }

  /* modo pin/búsqueda indicator */
  .sidebar-item .s-mode {
    font-size: 0.55rem;
    color: var(--rule);
    flex-shrink: 0;
  }
  .sidebar-item .s-mode.pinned { color: var(--accent); }

  .sidebar-new {
    padding: 10px 12px;
    font-size: 0.72rem;
    color: var(--muted);
    cursor: pointer;
    transition: color .15s;
    border-top: 1px solid var(--rule);
    margin-top: auto;
    font-weight: 500;
  }
  .sidebar-new:active { color: var(--ink); }

  /* radar inside sidebar bottom */
  .sidebar-radar {
    padding: 10px 12px;
    font-size: 0.65rem;
    color: var(--muted);
    border-top: 1px solid var(--rule);
  }
  .sidebar-radar input[type=range] { width: 100%; accent-color: var(--accent); height: 3px; margin-top: 4px; display: block; }

  /* ── MAIN CONTENT ── */
  #list-panel {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 40px;
    scrollbar-width: thin;
    scrollbar-color: var(--rule) transparent;
  }

  /* ── LIST HEADER ── */
  .list-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--rule);
  }
  .list-title {
    font-family: var(--serif);
    font-style: italic;
    font-size: 1.1rem;
    color: var(--ink);
  }
  .list-title .sym { font-family: var(--mono); font-style: normal; font-size: 0.9rem; margin-right: 4px; }
  .list-mode-btn {
    font-size: 0.65rem;
    color: var(--muted);
    background: none;
    border: 1px solid var(--rule);
    border-radius: 3px;
    padding: 3px 7px;
    font-family: var(--mono);
    cursor: pointer;
    transition: all .15s;
  }
  .list-mode-btn.pinned { color: var(--accent); border-color: var(--accent); }
  .list-mode-btn:active { background: var(--paper2); }

  /* pinned places list */
  .pinned-places {
    background: var(--paper2);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 8px 10px;
    margin-bottom: 14px;
    font-size: 0.72rem;
  }
  .pinned-places-title { color: var(--muted); margin-bottom: 6px; }
  .pinned-place-item {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 0;
    border-bottom: 1px dashed var(--rule);
    color: var(--ink2);
  }
  .pinned-place-item:last-child { border-bottom: none; }
  .pinned-place-item .p-name { flex: 1; }
  .pinned-place-item .p-dist { color: var(--muted); font-size: 0.65rem; }
  .btn-go {
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 3px;
    padding: 3px 8px;
    font-family: var(--mono);
    font-size: 0.65rem;
    cursor: pointer;
    transition: opacity .15s;
  }
  .btn-go:active { opacity: 0.7; }
  .btn-unpin { background: none; border: none; color: var(--rule); font-size: 0.75rem; cursor: pointer; padding: 0 2px; }
  .btn-unpin:active { color: var(--red); }
  .btn-add-pin {
    width: 100%;
    background: none;
    border: none;
    border-top: 1px dashed var(--rule);
    padding: 6px 0 0;
    margin-top: 4px;
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--muted);
    cursor: pointer;
    text-align: left;
    transition: color .15s;
  }
  .btn-add-pin:active { color: var(--ink); }

  /* ── ADD FORM ── */
  .add-form { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 1px solid var(--ink); padding-bottom: 4px; }
  .add-form::before { content: '+ '; font-family: var(--mono); font-size: 0.9rem; color: var(--muted); padding-top: 2px; flex-shrink: 0; }
  .add-form input { flex: 1; background: transparent; border: none; padding: 4px 6px; color: var(--ink); font-family: var(--mono); font-size: 0.88rem; outline: none; caret-color: var(--accent); }
  .add-form input::placeholder { color: var(--rule); }
  .btn-add { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; padding: 0 2px; }

  /* ── PROGRESS ── */
  .progress-line { font-size: 0.68rem; color: var(--muted); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .progress-track { flex: 1; height: 2px; background: var(--rule); border-radius: 1px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); transition: width .4s ease; }

  /* ── SECTION LABELS ── */
  .section-label { font-size: 0.68rem; color: var(--muted); margin-bottom: 5px; }
  .section-label::before { content: '### '; color: var(--rule); }
  .md-hr { border: none; border-top: 1px solid var(--rule); margin: 16px 0 12px; }

  /* ── ITEMS ── */
  .items-list { list-style: none; display: flex; flex-direction: column; }
  .item { display: flex; align-items: baseline; gap: 7px; padding: 5px 0; border-bottom: 1px dashed var(--rule); }
  @keyframes fadeIn { from{opacity:0;transform:translateX(-3px)} to{opacity:1;transform:translateX(0)} }
  .item.done { opacity: 0.4; }
  .item.done .item-name { text-decoration: line-through; color: var(--muted); }
  .item-check { font-family: var(--mono); font-size: 0.82rem; color: var(--muted); cursor: pointer; flex-shrink: 0; user-select: none; transition: color .15s; line-height: 1.6; }
  .item-check:active { color: var(--accent); }
  .item.done .item-check { color: var(--accent); }
  .item-name { flex: 1; font-family: var(--mono); font-size: 0.85rem; color: var(--ink2); line-height: 1.6; }
  .item-del { background: none; border: none; color: var(--rule); cursor: pointer; font-family: var(--mono); font-size: 0.7rem; padding: 0 6px; opacity: 0.4; transition: opacity .15s; }
  .item:hover .item-del { opacity: 1; }
  .item-del:active { color: var(--red); opacity: 1; }

  /* ── EMPTY STATE ── */
  .empty-state { padding: 28px 0; font-size: 0.78rem; color: var(--muted); line-height: 2; }
  .empty-state .md-comment { color: var(--rule); }

  .new-list-btn { display: block; width: 100%; text-align: left; background: none; border: none; border-top: 1px dashed var(--rule); padding: 12px 0 0; margin-top: 16px; font-family: var(--mono); font-size: 0.75rem; color: var(--muted); cursor: pointer; }
  .new-list-btn::before { content: '> '; color: var(--rule); }

  /* ── TOAST ── */
  #toast-container { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 999; width: calc(100% - 24px); max-width: 420px; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
  .toast { background: var(--ink); color: var(--paper); border-radius: 4px; padding: 11px 13px; display: flex; gap: 9px; align-items: flex-start; box-shadow: 0 4px 20px rgba(0,0,0,.2); pointer-events: all; animation: toastIn .25s ease; font-family: var(--mono); }
  @keyframes toastIn { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
  .toast.out { animation: toastOut .2s ease forwards; }
  @keyframes toastOut { to{opacity:0;transform:translateY(-8px)} }
  .toast-icon { font-size: 1.1rem; flex-shrink:0; }
  .toast-title { font-size: 0.8rem; font-weight: 600; margin-bottom: 2px; color: #e8dfc8; }
  .toast-items { font-size: 0.72rem; color: #8a8070; white-space: pre-line; }
  .toast-actions { display: flex; gap: 5px; margin-top: 6px; }
  .toast-btn { background: var(--paper2); color: var(--ink); border: none; border-radius: 3px; padding: 4px 9px; font-family: var(--mono); font-size: 0.7rem; cursor: pointer; }
  .toast-btn.primary { background: var(--accent); color: var(--paper); }
  .toast-close { background:none; border:none; color:#8a8070; cursor:pointer; font-size:0.9rem; flex-shrink:0; align-self: flex-start; }

  /* ── MODAL ── */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(26,26,24,.6); z-index: 200; display: flex; align-items: flex-end; animation: fadeIn2 .2s; }
  @keyframes fadeIn2 { from{opacity:0} to{opacity:1} }
  .modal { background: var(--paper); border-top: 2px solid var(--ink); padding: 22px 18px 34px; width: 100%; animation: slideUp .2s ease; }
  @keyframes slideUp { from{transform:translateY(30px)} to{transform:translateY(0)} }
  .modal-title { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); margin-bottom: 12px; }
  .modal-title::before { content: '## '; color: var(--rule); }
  .modal input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--ink); padding: 8px 0; font-family: var(--mono); font-size: 0.95rem; color: var(--ink); outline: none; margin-bottom: 14px; caret-color: var(--accent); }
  .modal input::placeholder { color: var(--rule); }
  .symbol-label { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); margin-bottom: 7px; }
  .symbol-picker { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 18px; }
  .sym-opt { background: var(--paper2); border: 1px solid var(--rule); border-radius: 3px; padding: 6px 8px; font-size: 1.1rem; cursor: pointer; transition: all .12s; }
  .sym-opt.sel { border-color: var(--ink); background: var(--paper); box-shadow: 2px 2px 0 var(--ink); }

  /* mode toggle in modal */
  .mode-toggle { display: flex; gap: 0; margin-bottom: 18px; border: 1px solid var(--rule); border-radius: 3px; overflow: hidden; }
  .mode-opt { flex: 1; padding: 8px; text-align: center; font-family: var(--mono); font-size: 0.72rem; color: var(--muted); cursor: pointer; background: var(--paper2); transition: all .15s; }
  .mode-opt.sel { background: var(--ink); color: var(--paper); }

  .modal-actions { display: flex; gap: 8px; }
  .btn-cancel { flex: 1; background: transparent; border: 1px solid var(--rule); border-radius: 3px; padding: 10px; font-family: var(--mono); font-size: 0.8rem; color: var(--muted); cursor: pointer; }
  .btn-confirm { flex: 2; background: var(--ink); color: var(--paper); border: none; border-radius: 3px; padding: 10px; font-family: var(--mono); font-size: 0.8rem; cursor: pointer; }

  /* ── PIN PLACE MODAL ── */
  #pin-modal .search-row { display: flex; gap: 6px; margin-bottom: 10px; }
  #pin-modal .search-input { flex: 1; background: transparent; border: none; border-bottom: 1px solid var(--ink); padding: 7px 0; font-family: var(--mono); font-size: 0.88rem; color: var(--ink); outline: none; caret-color: var(--accent); }
  #pin-modal .search-input::placeholder { color: var(--rule); }
  #pin-modal .btn-search { background: var(--ink); color: var(--paper); border: none; border-radius: 3px; padding: 7px 12px; font-family: var(--mono); font-size: 0.78rem; cursor: pointer; }
  .place-results { max-height: 200px; overflow-y: auto; margin-bottom: 14px; }
  .place-result-item { padding: 8px 0; border-bottom: 1px dashed var(--rule); cursor: pointer; display: flex; align-items: center; gap: 8px; }
  .place-result-item:active { background: var(--paper2); }
  .place-result-name { font-size: 0.82rem; color: var(--ink2); flex: 1; }
  .place-result-addr { font-size: 0.68rem; color: var(--muted); }
  .btn-pin-it { background: var(--accent); color: var(--paper); border: none; border-radius: 3px; padding: 4px 9px; font-family: var(--mono); font-size: 0.7rem; cursor: pointer; }

  .gm-style .gm-style-iw-c { border-radius: 4px !important; }

  /* ── NEARBY ALERT in list ── */
  .nearby-alert {
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1px solid var(--accent);
    border-radius: 3px;
    padding: 7px 10px;
    margin-bottom: 12px;
    font-size: 0.72rem;
    font-family: var(--mono);
    color: var(--ink2);
  }
  .nearby-alert-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; animation: pulse 2s infinite; }
  .nearby-alert-name { flex: 1; }
  .nearby-alert-dist { color: var(--muted); font-size: 0.65rem; margin-right: 4px; }
  .btn-nearby-go { background: var(--ink); color: var(--paper); border: none; border-radius: 3px; padding: 4px 9px; font-family: var(--mono); font-size: 0.68rem; cursor: pointer; flex-shrink: 0; }
  /* ── COMPOSE BAR (fixed bottom, survives keyboard) ── */
  #compose-bar {
    position: fixed;
    bottom: 0;
    left: var(--sidebar);
    right: 0;
    background: var(--paper);
    border-top: 1px solid var(--ink);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 0;
    z-index: 150;
  }
  #compose-bar::before { content: '+ '; font-family: var(--mono); font-size: 0.9rem; color: var(--muted); flex-shrink: 0; }
  #compose-input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 6px 6px;
    color: var(--ink);
    font-family: var(--mono);
    font-size: 0.88rem;
    outline: none;
    caret-color: var(--accent);
  }
  #compose-input::placeholder { color: var(--rule); }
  #compose-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.1rem;
    padding: 0 4px;
  }
  /* ── RADIUS SLIDER per list ── */
  .list-radius {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.65rem;
    color: var(--muted);
    font-family: var(--mono);
    margin-bottom: 14px;
    padding: 6px 0;
    border-bottom: 1px dashed var(--rule);
  }
  .list-radius input[type=range] {
    flex: 1;
    accent-color: var(--accent);
    height: 3px;
  }
  .list-radius span { color: var(--ink2); font-weight: 500; min-width: 42px; text-align: right; }

  /* Extra padding at bottom of list so compose bar doesn't cover items */
  #list-panel { padding-bottom: 60px; }

</style>
</head>
<body>

<header>
  <div class="logo">Lalistita</div>
  <div style="display:flex;align-items:center;gap:6px;font-size:0.7rem;font-family:var(--mono);color:var(--muted)">
    <div class="dot" id="geo-dot"></div>
    <span id="geo-label">sin ubicación</span>
  </div>
</header>

<!-- Status bar — mapa colapsado -->
<div id="status-bar">
  <span id="status-text" style="color:var(--muted);cursor:pointer;flex:1" onclick="toggleMap()">// tocá para activar el mapa</span>
  <button id="btn-search-now" onclick="searchNow()" style="background:none;border:1px solid var(--rule);border-radius:3px;padding:2px 8px;font-family:var(--mono);font-size:0.65rem;color:var(--muted);cursor:pointer;margin-right:6px;display:none">⊙ buscar</button>
  <span id="status-expand" style="cursor:pointer" onclick="toggleMap()">▾</span>
</div>

<!-- Mapa colapsable -->
<div id="map-panel">
  <div class="map-overlay" id="map-overlay">
    <h3>activar ubicación</h3>
    <pre>// te avisa cuando pasás
// cerca de un local
// con cosas en tu lista</pre>
    <button class="btn-enable" onclick="requestLocation()">activar_ubicacion()</button>
  </div>
  <div id="map"></div>
  <div class="nearby-list" id="nearby-list"></div>
</div>

<!-- App body: sidebar + lista -->
<div id="app-body">

  <!-- Sidebar izquierdo -->
  <div id="sidebar">
    <div class="sidebar-label">// listas</div>
    <div id="sidebar-lists"></div>
    <div class="sidebar-new" onclick="showModal()">+ nueva lista</div>
  </div>

  <!-- Contenido principal -->
  <div id="list-panel">
    <div id="list-content"></div>
  </div>

</div>

<!-- Compose bar fijo -->
<div id="compose-bar">
  <input id="compose-input" placeholder="agregar ítem..." onkeydown="if(event.key==='Enter')addItem()">
  <button id="compose-btn" onpointerdown="event.preventDefault();addItem()">↵</button>
</div>

<div id="toast-container"></div>

<!-- Modal nueva lista -->
<div class="modal-backdrop" id="modal" style="display:none" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">nueva lista</div>
    <input id="new-list-name" placeholder="nombre de la lista..." maxlength="30">
    <div class="symbol-label">// símbolo</div>
    <div class="symbol-picker" id="symbol-picker"></div>
    <div class="symbol-label" style="margin-bottom:8px">// modo de búsqueda</div>
    <div class="mode-toggle" id="mode-toggle">
      <div class="mode-opt sel" data-mode="search" onclick="selectMode('search',this)">⊙ buscar siempre</div>
      <div class="mode-opt" data-mode="pinned" onclick="selectMode('pinned',this)">⊕ local fijo</div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="hideModal()">cancelar</button>
      <button class="btn-confirm" onclick="createList()">crear lista →</button>
    </div>
  </div>
</div>

<!-- Modal fijar local -->
<div class="modal-backdrop" id="pin-modal" style="display:none" onclick="closePinModal(event)">
  <div class="modal">
    <div class="modal-title">vincular local</div>
    <div class="search-row">
      <input class="search-input" id="pin-search-input" placeholder="nombre del local..." onkeydown="if(event.key==='Enter')searchPlaceToPin()">
      <button class="btn-search" onclick="searchPlaceToPin()">buscar</button>
    </div>
    <div class="place-results" id="place-results">
      <div style="font-size:0.72rem;color:var(--rule)">// buscá el local para vincularlo</div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="hidePinModal()">cancelar</button>
    </div>
  </div>
</div>

<script>
const SYMBOLS = ['⚒','◉','⊞','✂','⊛','⌘','⚗','⊕','⊜','⌂','⊟','⍟','∞','⌬','⊡'];

const DEFAULT_LISTS = [
  { id:'ferreteriaList', name:'Ferretería', emoji:'⚒', mode:'search', pinnedPlaces:[], keywords:['ferretería','ferreteria','hardware','pinturería'], items:[], radius:50 },
  { id:'farmaciaList',   name:'Farmacia',   emoji:'◉', mode:'search', pinnedPlaces:[], keywords:['farmacia','droguería','pharmacy'], items:[], radius:50 },
  { id:'supermercadoList',name:'Supermercado',emoji:'⊞',mode:'search',pinnedPlaces:[],keywords:['supermercado','supermarket','almacén','mercado','disco','jumbo','carrefour','coto','dia'],items:[],radius:50 },
];

let state = {
  lists:[], activeList:null,
  userPos:null, nearbyPlaces:[], notified:{},
  nearbyAlert:{}, // listId -> {placeName, placeId, dist} — se limpia al resetear notified
};
let map=null, userMarker=null, placeMarkers=[], mapExpanded=false;
let pinningListId = null;

// ── STORAGE ──
function save() {
  try { localStorage.setItem('lalistita_v2', JSON.stringify({lists:state.lists})); } catch(e){}
}
function load() {
  try {
    const raw = localStorage.getItem('lalistita_v2') || localStorage.getItem('lalistita_v1') || localStorage.getItem('listago_v2');
    if (raw) {
      const d = JSON.parse(raw);
      state.lists = d.lists || DEFAULT_LISTS;
      state.lists.forEach(l => {
        if (!l.mode) l.mode = 'search';
        if (!l.pinnedPlaces) l.pinnedPlaces = [];
        if (!l.radius) l.radius = 50;
        if (!l.placeTypes) {
          // Migrar listas viejas con placeTypes
          if (l.id==='ferreteriaList') l.placeTypes=['hardware_store'];
          else if (l.id==='farmaciaList') l.placeTypes=['pharmacy'];
          else if (l.id==='supermercadoList') l.placeTypes=['supermarket','grocery_or_supermarket'];
          else l.placeTypes=[];
        }
      });
      // Si solo tiene las 3 listas viejas sin ítems, migrar a las 8 nuevas
      const hasOnlyOld3 = state.lists.length===3 && state.lists.every(l=>!l.items.length);
      if (hasOnlyOld3) state.lists = DEFAULT_LISTS;
    } else {
      state.lists = DEFAULT_LISTS;
    }
  } catch(e) { state.lists = DEFAULT_LISTS; }
  state.activeList = state.lists[0]?.id || null;
}

// ── RENDER ──
function render() {
  renderSidebar();
  renderList();

}

function renderSidebar() {
  const c = document.getElementById('sidebar-lists');
  const pending = l => l.items.filter(i=>!i.done).length;
  c.innerHTML = state.lists.map(l => `
    <div class="sidebar-item ${l.id===state.activeList?'active':''}" onclick="switchList('${l.id}')">
      <span class="sym">${l.emoji}</span>
      <span class="s-name">${escapeHTML(l.name)}</span>
      ${pending(l)>0?`<span class="s-badge">${pending(l)}</span>`:''}
      <span class="s-mode ${l.mode==='pinned'&&l.pinnedPlaces.length?'pinned':''}">${l.mode==='pinned'?(l.pinnedPlaces.length?'⊕':'○'):'⊙'}</span>
    </div>
  `).join('');
}

function renderList() {
  const c = document.getElementById('list-content');
  const list = state.lists.find(l=>l.id===state.activeList);
  if (!list) { c.innerHTML=''; return; }

  const done = list.items.filter(i=>i.done);
  const pending = list.items.filter(i=>!i.done);
  const pct = list.items.length ? Math.round(done.length/list.items.length*100) : 0;
  const isPinned = list.mode==='pinned';
  const hasPins = isPinned && list.pinnedPlaces.length>0;

  // Pinned places section
  let pinnedHTML = '';
  if (isPinned) {
    const placesHTML = list.pinnedPlaces.map(p => {
      const dist = state.userPos ? getDistanceLabel(state.userPos, p) : '';
      return `<div class="pinned-place-item">
        <span class="p-name">${escapeHTML(p.name)}</span>
        ${dist?`<span class="p-dist">${dist}</span>`:''}
        <button class="btn-go" onclick="goToPlace('${p.place_id}','${escapeHTML(p.name)}','${list.id}')">ir →</button>
        <button class="btn-unpin" onclick="unpinPlace('${list.id}','${p.place_id}')">✕</button>
      </div>`;
    }).join('');
    pinnedHTML = `
      <div class="pinned-places">
        <div class="pinned-places-title">// locales vinculados</div>
        ${placesHTML || '<div style="color:var(--rule);font-size:0.7rem">// ninguno aún</div>'}
        <button class="btn-add-pin" onclick="showPinModal('${list.id}')">+ vincular local</button>
      </div>`;
  }

  const alert = state.nearbyAlert[list.id];
  const alertHTML = alert ? `
    <div class="nearby-alert">
      <div class="nearby-alert-dot"></div>
      <span class="nearby-alert-name">${escapeHTML(alert.placeName)}</span>
      ${alert.dist ? `<span class="nearby-alert-dist">${alert.dist}</span>` : ''}
      <button class="btn-nearby-go" onclick="goToPlace('${alert.placeId}','${escapeHTML(alert.placeName)}','${list.id}')">ir →</button>
    </div>` : '';

  c.innerHTML = `
    <div class="list-header">
      <div class="list-title"><span class="sym">${list.emoji}</span>${escapeHTML(list.name)}</div>
      <button class="list-mode-btn ${isPinned?'pinned':''}" onclick="toggleListMode('${list.id}')">
        ${isPinned?'⊕ fijo':'⊙ búsqueda'}
      </button>
    </div>
    ${alertHTML}
    ${pinnedHTML}
    <div class="list-radius">
      <span>// radio</span>
      <input type="range" min="50" max="500" step="50" value="${list.radius||50}"
        oninput="updateListRadius('${list.id}',this.value)">
      <span id="radius-label-${list.id}">${list.radius||50} m</span>
    </div>

    ${list.items.length>0?`
      <div class="progress-line">
        <span>${done.length}/${list.items.length}</span>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        <span>${pct}%</span>
      </div>`:''}
    ${pending.length>0?`
      <div class="section-label">pendiente (${pending.length})</div>
      <ul class="items-list" id="pending-list">${pending.map(i=>itemHTML(i)).join('')}</ul>`:''}
    ${done.length>0?`
      <hr class="md-hr">
      <div class="section-label">comprado (${done.length})</div>
      <ul class="items-list">${done.map(i=>itemHTML(i)).join('')}</ul>`:''}
    ${list.items.length===0?`
      <div class="empty-state">
        <span class="md-comment">// lista vacía</span><br>
        <span class="md-comment">// agregá lo que necesitás</span>
      </div>`:''}
  `;
}

function itemHTML(item) {
  return `<li class="item ${item.done?'done':''}" id="item-${item.id}">
    <span class="item-check" onclick="toggleItem('${item.id}')">${item.done?'[x]':'[ ]'}</span>
    <span class="item-name">${escapeHTML(item.name)}</span>
    <button class="item-del" onclick="deleteItem('${item.id}')">~~del~~</button>
  </li>`;
}
function escapeHTML(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── DISTANCE LABEL ──
function getDistanceLabel(from, to) {
  const d = distanceBetween(from, {lat: to.lat, lng: to.lng});
  return d < 1000 ? Math.round(d)+'m' : (d/1000).toFixed(1)+'km';
}

// ── ACTIONS ──
function switchList(id) {
  if (state.activeList === id) return; // already active, don't re-render
  state.activeList=id;
  render();
}

function addItem() {
  const input = document.getElementById('compose-input');
  const name = input.value.trim();
  if (!name) return;
  const list = state.lists.find(l => l.id === state.activeList);
  if (!list) return;
  list.items.unshift({id: 'i' + Date.now(), name, done: false});
  input.value = '';
  save();
  renderList();
  renderSidebar();
  requestAnimationFrame(() => {
    const inp = document.getElementById('compose-input');
    if (inp) inp.focus();
  });
}

function updateSidebarBadge(list) {
  const pending = list.items.filter(i=>!i.done).length;
  const sidebarItem = document.querySelector(`.sidebar-item[onclick="switchList('${list.id}')"]`);
  if (!sidebarItem) return;
  let badge = sidebarItem.querySelector('.s-badge');
  if (pending > 0) {
    if (!badge) {
      badge = document.createElement('span');
      badge.className = 's-badge';
      const modeSpan = sidebarItem.querySelector('.s-mode');
      sidebarItem.insertBefore(badge, modeSpan);
    }
    badge.textContent = pending;
  } else if (badge) {
    badge.remove();
  }
}

function updateProgress(list) {
  const done = list.items.filter(i=>i.done).length;
  const total = list.items.length;
  const pct = total ? Math.round(done/total*100) : 0;
  const fill = document.querySelector('.progress-fill');
  const line = document.querySelector('.progress-line');
  if (fill) fill.style.width = pct+'%';
  if (line) {
    const spans = line.querySelectorAll('span');
    if (spans[0]) spans[0].textContent = done+'/'+total;
    if (spans[2]) spans[2].textContent = pct+'%';
  }
  // Actualizar label de sección pendiente
  const secLabel = document.querySelector('.section-label');
  const pending = list.items.filter(i=>!i.done).length;
  if (secLabel && secLabel.textContent.includes('pendiente')) {
    secLabel.textContent = 'pendiente ('+pending+')';
  }
}
function toggleItem(id) {
  for (const l of state.lists) {
    const item=l.items.find(x=>x.id===id);
    if(item){
      item.done=!item.done;
      save();
      // Update DOM directly — no re-render, keeps keyboard open
      const li=document.getElementById('item-'+id);
      if(li){
        const check=li.querySelector('.item-check');
        const name=li.querySelector('.item-name');
        if(item.done){
          li.classList.add('done');
          if(check) check.textContent='[x]';
          if(name) name.style.textDecoration='line-through';
        } else {
          li.classList.remove('done');
          if(check) check.textContent='[ ]';
          if(name) name.style.textDecoration='';
        }
        // Move to correct section
        const list = state.lists.find(l=>l.items.some(x=>x.id===id));
        if(list) { updateSidebarBadge(list); updateProgress(list); }
      } else {
        render();
      }
      break;
    }
  }
}
function deleteItem(id) {
  for (const l of state.lists) {
    const idx=l.items.findIndex(x=>x.id===id);
    if(idx!==-1){
      l.items.splice(idx,1);
      save();
      const li=document.getElementById('item-'+id);
      if(li){ li.style.opacity='0'; li.style.transition='opacity .2s'; setTimeout(()=>li.remove(),200); updateSidebarBadge(l); updateProgress(l); }
      else render();
      break;
    }
  }
}

function updateListRadius(listId, val) {
  const list = state.lists.find(l=>l.id===listId);
  if (!list) return;
  list.radius = parseInt(val);
  const label = document.getElementById('radius-label-'+listId);
  if (label) label.textContent = list.radius+' m';
  save();
}

function toggleListMode(listId) {
  const list=state.lists.find(l=>l.id===listId);
  if (!list) return;
  list.mode = list.mode==='pinned' ? 'search' : 'pinned';
  save(); render();
}

// ── PIN PLACE ──
function showPinModal(listId) {
  pinningListId = listId;
  document.getElementById('pin-search-input').value='';
  document.getElementById('place-results').innerHTML='<div style="font-size:0.72rem;color:var(--rule)">// buscá el local para vincularlo</div>';
  document.getElementById('pin-modal').style.display='flex';
  setTimeout(()=>document.getElementById('pin-search-input').focus(), 100);
}
function hidePinModal() { document.getElementById('pin-modal').style.display='none'; pinningListId=null; }
function closePinModal(e) { if(e.target.id==='pin-modal') hidePinModal(); }

function searchPlaceToPin() {
  const q = document.getElementById('pin-search-input').value.trim();
  if (!q) return;
  const resultsEl = document.getElementById('place-results');
  resultsEl.innerHTML='<div style="font-size:0.72rem;color:var(--muted)">// buscando...</div>';

  // Asegurar que Maps esté cargado
  if (typeof google === 'undefined') {
    const resultsEl2 = document.getElementById('place-results');
    resultsEl2.innerHTML='<div style="font-size:0.72rem;color:var(--red)">// activá la ubicación primero desde la barra superior</div>';
    return;
  }

  // Necesitamos un div auxiliar para PlacesService si no hay mapa
  let serviceTarget = map;
  if (!serviceTarget) {
    const aux = document.createElement('div');
    serviceTarget = new google.maps.Map(aux, { center: state.userPos || {lat:-34.6,lng:-58.38}, zoom: 15 });
  }

  const service = new google.maps.places.PlacesService(serviceTarget);
  const searchOpts = { query: q };
  if (state.userPos) {
    searchOpts.location = new google.maps.LatLng(state.userPos.lat, state.userPos.lng);
    searchOpts.radius = 10000;
  }

  service.textSearch(searchOpts, (results, status) => {
    if (!results || status !== 'OK') {
      resultsEl.innerHTML='<div style="font-size:0.72rem;color:var(--red)">// sin resultados</div>'; return;
    }
    resultsEl.innerHTML = results.slice(0,6).map(p => {
      const plat = p.geometry.location.lat();
      const plng = p.geometry.location.lng();
      const dist = state.userPos ? getDistanceLabel(state.userPos, {lat:plat,lng:plng}) : '';
      const safeId = p.place_id.replace(/'/g, '');
      const safeName = escapeHTML(p.name).replace(/'/g,"\'");
      return `<div class="place-result-item" onclick="pinPlace('${safeId}','${safeName}',${plat},${plng})">
        <div style="flex:1">
          <div class="place-result-name">${escapeHTML(p.name)}</div>
          <div class="place-result-addr">${escapeHTML((p.formatted_address||'').split(',').slice(0,2).join(','))}</div>
        </div>
        <span style="font-size:0.65rem;color:var(--muted)">${dist}</span>
        <button class="btn-pin-it">⊕ fijar</button>
      </div>`;
    }).join('');
  });
}

function pinPlace(placeId, name, lat, lng) {
  const list = state.lists.find(l=>l.id===pinningListId);
  if (!list) return;
  if (!list.pinnedPlaces.some(p=>p.place_id===placeId)) {
    list.pinnedPlaces.push({place_id:placeId, name, lat, lng});
  }
  list.mode='pinned';
  save(); render(); hidePinModal();
  showToast('⊕','local vinculado',`${name} → ${list.name}`,3000);
}

function unpinPlace(listId, placeId) {
  const list=state.lists.find(l=>l.id===listId);
  if (!list) return;
  list.pinnedPlaces = list.pinnedPlaces.filter(p=>p.place_id!==placeId);
  save(); render();
}

// ── IR → abre Google Maps con la ruta ──
function goToPlace(placeId, name, listId) {
  if (listId) switchList(listId);
  const url = `https://www.google.com/maps/dir/?api=1&destination_place_id=${placeId}&destination=${encodeURIComponent(name)}&travelmode=walking`;
  window.open(url, '_blank');
}

// ── MAP TOGGLE ──
function toggleMap() {
  mapExpanded = !mapExpanded;
  const panel = document.getElementById('map-panel');
  const arrow = document.getElementById('status-expand');
  panel.classList.toggle('expanded', mapExpanded);
  arrow.textContent = mapExpanded ? '▴' : '▾';
  if (mapExpanded && !map && state.userPos) requestLocation();
  if (mapExpanded && map) google.maps.event.trigger(map, 'resize');
}

// ── RADIUS ──
// ── GEOLOCATION ──
function requestLocation() {
  if (!navigator.geolocation) { showToast('📍','error','sin soporte de geolocalización',4000); return; }
  document.getElementById('geo-label').textContent='cargando...';
  if (typeof google!=='undefined') { onMapsScriptLoaded(); return; }
  const script=document.createElement('script');
  script.src='https://maps.googleapis.com/maps/api/js?key=AIzaSyBV6Tv8M5q8i7a00ruFk7IuTeW86VoCcBY&libraries=places&callback=onMapsScriptLoaded';
  script.async=true;
  script.onerror=()=>{ fallbackGeo('demo'); };
  document.head.appendChild(script);
}

function fallbackGeo(label) {
  navigator.geolocation.getCurrentPosition(pos=>{
    state.userPos={lat:pos.coords.latitude,lng:pos.coords.longitude};
    setGeoActive(label);
    initMockMap(state.userPos.lat,state.userPos.lng);
  },()=>{
    state.userPos={lat:-34.603684,lng:-58.381559};
    setGeoActive(label);
    initMockMap(state.userPos.lat,state.userPos.lng);
  });
}

function setGeoActive(label) {
  document.getElementById('geo-dot').classList.add('active');
  document.getElementById('geo-label').textContent=label;
  const sb = document.getElementById('btn-search-now'); if(sb) sb.style.display='block';
}

window.onMapsScriptLoaded = function() {
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude:lat,longitude:lng}=pos.coords;
    state.userPos={lat,lng};
    setGeoActive('activo');
    document.getElementById('map-overlay').style.display='none';
    updateStatusBar();
    if (mapExpanded) {
      map = new google.maps.Map(document.getElementById('map'),{center:{lat,lng},zoom:15,disableDefaultUI:true,styles:LIGHT_STYLE});
      userMarker = new google.maps.Marker({position:{lat,lng},map,icon:{path:google.maps.SymbolPath.CIRCLE,scale:9,fillColor:'#2d5a27',fillOpacity:1,strokeColor:'#f5f0e8',strokeWeight:3}});
    }
    searchNearby();
    navigator.geolocation.watchPosition(p=>{
      state.userPos={lat:p.coords.latitude,lng:p.coords.longitude};
      if (map) { map.setCenter(state.userPos); if(userMarker) userMarker.setPosition(state.userPos); }
      updateStatusBar();
      searchNearby();
    },()=>{},{enableHighAccuracy:true,maximumAge:30000});
  },()=>{
    state.userPos={lat:-34.603684,lng:-58.381559};
    setGeoActive('sin gps');
    updateStatusBar();
  },{enableHighAccuracy:true,timeout:10000});
};

function ensureMap() {
  if (map || !state.userPos || typeof google==='undefined') return;
  map = new google.maps.Map(document.getElementById('map'),{center:state.userPos,zoom:15,disableDefaultUI:true,styles:LIGHT_STYLE});
  userMarker = new google.maps.Marker({position:state.userPos,map,icon:{path:google.maps.SymbolPath.CIRCLE,scale:9,fillColor:'#2d5a27',fillOpacity:1,strokeColor:'#f5f0e8',strokeWeight:3}});
}

// Llamar ensureMap cuando se expande
const _origToggleMap = toggleMap;
window.toggleMap = function() {
  mapExpanded = !mapExpanded;
  const panel=document.getElementById('map-panel');
  const arrow=document.getElementById('status-expand');
  panel.classList.toggle('expanded',mapExpanded);
  arrow.textContent=mapExpanded?'▴':'▾';
  if (mapExpanded) {
    if (!state.userPos) { requestLocation(); }
    else {
      ensureMap();
      if (map) setTimeout(()=>google.maps.event.trigger(map,'resize'),50);
    }
  }
};

function searchNow() {
  const btn = document.getElementById('btn-search-now');
  if (btn) { btn.textContent = '// buscando...'; btn.disabled = true; }
  placeCache = {pos:null, timestamp:0, places:[]};
  state.notified = {};
  searchNearby(true);
  setTimeout(() => {
    if (btn) { btn.textContent = '⊙ buscar'; btn.disabled = false; }
  }, 3000);
}

function updateStatusBar() {
  const el=document.getElementById('status-text');
  if (!state.userPos) { el.textContent='// tocá para activar el mapa'; el.style.color='var(--muted)'; return; }
  const matches = state.nearbyPlaces.filter(p=>p.matchedList).length;
  if (matches>0) {
    el.innerHTML=`<span style="color:var(--accent)">● ${matches} local${matches>1?'es':''} cerca con ítems pendientes</span>`;
  } else {
    el.textContent=`● activo — sin coincidencias cercanas`;
    el.style.color='var(--muted)';
  }
}

// ── PLACE CACHE ──
const SEARCH_CACHE_DISTANCE=200;
const SEARCH_CACHE_TTL=5*60*1000;
let placeCache={pos:null,timestamp:0,places:[]};

function distanceBetween(a,b) {
  const R=6371000,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180;
  const s=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s));
}

function searchNearby(force=false) {
  if (!state.userPos || typeof google==='undefined') return;

  // Verificar locales fijos primero (no necesitan mapa ni Places)
  checkPinnedPlaces();

  // Crear servicio aunque el mapa esté colapsado
  if (!window._placesServiceDiv) {
    window._placesServiceDiv = document.createElement('div');
    window._placesServiceMap = new google.maps.Map(window._placesServiceDiv, {
      center: state.userPos, zoom: 15
    });
  }
  const serviceMap = map || window._placesServiceMap;

  const now=Date.now();
  const movedFar=!placeCache.pos||distanceBetween(placeCache.pos,state.userPos)>SEARCH_CACHE_DISTANCE;
  const expired=(now-placeCache.timestamp)>SEARCH_CACHE_TTL;

  if (!force&&!movedFar&&!expired&&placeCache.places.length) {
    const listsSearch=state.lists.filter(l=>l.items.some(i=>!i.done));
    const closestPerList = {};
    placeCache.places.forEach(place=>{
      if(!place.geometry) return;
      const pp={lat:place.geometry.location.lat(),lng:place.geometry.location.lng()};
      const dist=distanceBetween(state.userPos,pp);
      const match=matchPlaceToList(place,listsSearch);
      if(!match || dist>(match.radius||50)) return;
      if(!closestPerList[match.id] || dist < closestPerList[match.id].dist) {
        closestPerList[match.id] = {place, list: match, dist};
      }
    });
    Object.values(closestPerList).forEach(({place, list}) => checkNotify(place, list));
    updateNearbyChips(); updateStatusBar(); return;
  }

  placeMarkers.forEach(m=>m.setMap(null));
  placeMarkers=[]; state.nearbyPlaces=[];
  // Buscar para listas en modo search, O listas en modo pinned sin locales vinculados
  const listsSearch=state.lists.filter(l=>l.items.some(i=>!i.done));
  if (!listsSearch.length) { updateStatusBar(); return; }

  const service=new google.maps.places.PlacesService(serviceMap);
  const searchRadius=Math.max(...state.lists.map(l=>l.radius||50));
  const center=new google.maps.LatLng(state.userPos.lat,state.userPos.lng);
  let allPlaces=[]; let pending=7;

  const onResults=(results,status)=>{
    if(results&&status==='OK') allPlaces=allPlaces.concat(results);
    pending--;
    if(pending===0){
      const seen=new Set();
      allPlaces=allPlaces.filter(p=>{if(seen.has(p.place_id))return false;seen.add(p.place_id);return true;});
      placeCache={pos:{...state.userPos},timestamp:Date.now(),places:allPlaces};
      // Para cada lista, encontrar el local más cercano dentro del radio
      const closestPerList = {};
      allPlaces.forEach(place=>{
        if(!place.geometry)return;
        const pp={lat:place.geometry.location.lat(),lng:place.geometry.location.lng()};
        const dist=distanceBetween(state.userPos,pp);
        const match=matchPlaceToList(place,listsSearch);
        addPlaceMarker(place, match && dist<=(match.radius||50) ? match : null);
        if(!match) return;
        if(dist>(match.radius||50)) return;
        // Guardar solo el más cercano por lista
        if(!closestPerList[match.id] || dist < closestPerList[match.id].dist) {
          closestPerList[match.id] = {place, list: match, dist};
        }
      });
      // Notificar solo el más cercano de cada lista
      Object.values(closestPerList).forEach(({place, list}) => checkNotify(place, list));
      updateNearbyChips(); updateStatusBar();
    }
  };
  ['pharmacy','hardware_store','supermarket','book_store','beauty_salon','veterinary_care','pet_store'].forEach(type=>{
    service.nearbySearch({location:center,radius:searchRadius,type},onResults);
  });
}

// Chequear locales fijos — no usa Places API
function checkPinnedPlaces() {
  if (!state.userPos) return;
  const pinnedLists=state.lists.filter(l=>l.mode==='pinned'&&l.pinnedPlaces.length&&l.items.some(i=>!i.done));
  pinnedLists.forEach(list=>{
    // Solo notificar el local fijo más cercano dentro del radio
    let closest = null;
    list.pinnedPlaces.forEach(place=>{
      const dist=distanceBetween(state.userPos,{lat:place.lat,lng:place.lng});
      if(dist<=(list.radius||50)) {
        if(!closest || dist < closest.dist) closest = {place, dist};
      }
    });
    if(closest) checkNotifyPinned(closest.place, list, closest.dist);
  });
  // Agregar marcadores de fijos al mapa si está abierto
  if (map) {
    pinnedLists.forEach(list=>{
      list.pinnedPlaces.forEach(place=>{
        if(!placeMarkers.find(m=>m.getTitle()===place.place_id)) {
          const marker=new google.maps.Marker({
            position:{lat:place.lat,lng:place.lng},map,title:place.place_id,
            icon:{path:google.maps.SymbolPath.CIRCLE,scale:9,fillColor:'#2d5a27',fillOpacity:0.9,strokeColor:'#f5f0e8',strokeWeight:2},
          });
          placeMarkers.push(marker);
        }
      });
    });
  }
  renderSidebar(); // update distance labels
}

function checkNotifyPinned(place, list, dist) {
  const key=`pinned_${place.place_id}_${list.id}`;
  if(state.notified[key]) return;
  const pending=list.items.filter(i=>!i.done);
  if(!pending.length) return;
  state.notified[key]=true;
  const distLabel=dist<1000?Math.round(dist)+'m':(dist/1000).toFixed(1)+'km';
  const items=pending.slice(0,4).map(i=>`• ${i.name}`).join('\n')+(pending.length>4?`\n…y ${pending.length-4} más`:'');
  if(navigator.vibrate) navigator.vibrate([200,100,200]);
  state.nearbyAlert[list.id] = {placeName:place.name, placeId:place.place_id, dist:distLabel};
  showToastWithGo(list.emoji,`${list.name} — ${place.name} (${distLabel})`,items,place.place_id,place.name,list.id);
  sendNativeNotification(list,place.name);
}

// Palabras que siempre excluyen un local (mayoristas, distribuidoras)
const ALWAYS_EXCLUDE = ['mayorista','wholesale','distribuidora','distribuidor','depósito','deposito','laboratorio','fábrica','fabrica','cash & carry','cash and carry'];

function matchPlaceToList(place, lists) {
  const name = (place.name||'').toLowerCase();
  const types = place.types||[];

  // Excluir mayoristas/distribuidoras de cualquier lista
  if (ALWAYS_EXCLUDE.some(w => name.includes(w))) return null;

  for (const list of lists) {
    // Keywords del usuario — prioridad máxima
    if ((list.keywords||[]).some(k => k && name.includes(k))) return list;
    // Tipos de Places configurados en la lista
    if ((list.placeTypes||[]).some(t => types.includes(t))) return list;
  }
  return null;
}

function addPlaceMarker(place,matchedList) {
  if(!map||!place.geometry)return; // solo mostrar marcador si mapa está abierto
  const marker=new google.maps.Marker({
    position:place.geometry.location,map,title:place.name,
    icon:{path:google.maps.SymbolPath.CIRCLE,scale:matchedList?8:5,fillColor:matchedList?'#2d5a27':'#c4bfb4',fillOpacity:0.85,strokeColor:'#f5f0e8',strokeWeight:2},
  });
  state.nearbyPlaces.push({place,matchedList,marker});
  placeMarkers.push(marker);
  if(matchedList){
    const iw=new google.maps.InfoWindow({content:`<div style="font-family:'JetBrains Mono',monospace;font-size:12px;padding:6px 8px;color:#1a1a18"><strong>${matchedList.emoji} ${matchedList.name}</strong><br>${place.name}<br><span style="color:#8a8578">${matchedList.items.filter(i=>!i.done).length} pendientes</span></div>`});
    marker.addListener('click',()=>{ iw.open(map,marker); switchList(matchedList.id); });
  }
}

function checkNotify(place,list) {
  const key=`${place.place_id}_${list.id}`;
  if(state.notified[key])return;
  const pending=list.items.filter(i=>!i.done);
  if(!pending.length)return;
  state.notified[key]=true;
  const items=pending.slice(0,4).map(i=>`• ${i.name}`).join('\n')+(pending.length>4?`\n…y ${pending.length-4} más`:'');
  if(navigator.vibrate) navigator.vibrate([200,100,200]);
  state.nearbyAlert[list.id] = {placeName:place.name, placeId:place.place_id};
  showToastWithGo(list.emoji,`${list.name} cerca — ${place.name}`,items,place.place_id,place.name,list.id);
  sendNativeNotification(list,place.name);
}

function updateNearbyChips() {
  const c=document.getElementById('nearby-list');
  if(!state.nearbyPlaces.length){c.innerHTML='';return;}
  c.innerHTML=state.nearbyPlaces.map(({place,matchedList})=>
    `<div class="nearby-chip ${matchedList?'match':''}">${matchedList?matchedList.emoji:'·'} ${place.name}</div>`
  ).join('');
}

// ── MOCK MAP ──
function initMockMap(lat,lng) {
  document.getElementById('map-overlay').style.display='none';
  document.getElementById('map').innerHTML=`<div style="width:100%;height:100%;background:var(--paper2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;font-family:'JetBrains Mono',monospace"><div style="font-size:0.72rem;color:var(--muted)">// modo demo</div><div style="font-size:0.68rem;color:var(--rule)">${lat.toFixed(4)}, ${lng.toFixed(4)}</div></div>`;
  updateStatusBar();
}

// ── TOAST WITH GO BUTTON ──
function showToastWithGo(icon,title,body,placeId,placeName,listId) {
  const c=document.getElementById('toast-container');
  const id='toast_'+Date.now();
  const el=document.createElement('div');
  el.className='toast'; el.id=id;
  el.innerHTML=`
    <div class="toast-icon">${icon}</div>
    <div style="flex:1">
      <div class="toast-title">${escapeHTML(title)}</div>
      <div class="toast-items">${escapeHTML(body)}</div>
      <div class="toast-actions">
        <button class="toast-btn primary" onclick="toastGo('${id}','${placeId}','${escapeHTML(placeName)}','${listId}')">ir →</button>
        <button class="toast-btn" onclick="switchList('${listId}');dismissToast('${id}')">ver lista</button>
        <button class="toast-btn" onclick="dismissToast('${id}')">ignorar</button>
      </div>
    </div>
    <button class="toast-close" onclick="dismissToast('${id}')">✕</button>`;
  c.appendChild(el);
  setTimeout(()=>dismissToast(id),12000);
}

function toastGo(toastId,placeId,placeName,listId) {
  switchList(listId);
  dismissToast(toastId);
  goToPlace(placeId,placeName,null);
}

function showToast(icon,title,body,duration=5000,onClick=null) {
  const c=document.getElementById('toast-container');
  const id='toast_'+Date.now();
  const el=document.createElement('div');
  el.className='toast'; el.id=id;
  el.innerHTML=`
    <div class="toast-icon">${icon}</div>
    <div style="flex:1;cursor:${onClick?'pointer':'default'}" onclick="${onClick?`toastClick('${id}')`:''}">
      <div class="toast-title">${escapeHTML(title)}</div>
      <div class="toast-items">${escapeHTML(body)}</div>
    </div>
    <button class="toast-close" onclick="dismissToast('${id}')">✕</button>`;
  if(onClick) el._onClick=onClick;
  c.appendChild(el);
  setTimeout(()=>dismissToast(id),duration);
}
function toastClick(id){const el=document.getElementById(id);if(el&&el._onClick)el._onClick();dismissToast(id);}
function dismissToast(id){const el=document.getElementById(id);if(!el)return;el.classList.add('out');setTimeout(()=>el.remove(),200);}

// ── MODAL NUEVA LISTA ──
let selectedSym=SYMBOLS[0], selectedMode='search';
function showModal() {
  selectedSym=SYMBOLS[0]; selectedMode='search';
  document.getElementById('new-list-name').value='';
  document.getElementById('symbol-picker').innerHTML=SYMBOLS.map(s=>
    `<div class="sym-opt ${s===selectedSym?'sel':''}" onclick="selectSym('${s}',this)">${s}</div>`
  ).join('');
  document.querySelectorAll('.mode-opt').forEach(el=>{
    el.classList.toggle('sel',el.dataset.mode==='search');
  });
  document.getElementById('modal').style.display='flex';
}
function hideModal(){document.getElementById('modal').style.display='none';}
function closeModal(e){if(e.target.id==='modal')hideModal();}
function selectSym(s,el){selectedSym=s;document.querySelectorAll('.sym-opt').forEach(x=>x.classList.remove('sel'));el.classList.add('sel');}
function selectMode(m,el){selectedMode=m;document.querySelectorAll('.mode-opt').forEach(x=>x.classList.remove('sel'));el.classList.add('sel');}
function createList(){
  const name=document.getElementById('new-list-name').value.trim();
  if(!name)return;
  const id='list_'+Date.now();
  state.lists.push({id,name,emoji:selectedSym,mode:selectedMode,pinnedPlaces:[],keywords:[name.toLowerCase()],items:[],radius:50});
  state.activeList=id;
  hideModal();save();render();
}

// ── SERVICE WORKER ──
let swRegistration=null;
async function registerSW(){
  if (!('serviceWorker' in navigator)) return;
  try {
    // Limpiar SWs viejos primero
    const regs = await navigator.serviceWorker.getRegistrations();
    for (const reg of regs) await reg.unregister();
    // Registrar nuevo
    swRegistration = await navigator.serviceWorker.register('sw.js');
  } catch(e) { console.log('SW error:', e); }
}

// ── NOTIFICACIONES ──
async function requestNotificationPermission(){
  if(!('Notification'in window))return false;
  if(Notification.permission==='granted')return true;
  return(await Notification.requestPermission())==='granted';
}
function sendNativeNotification(list,placeName){
  const pending=list.items.filter(i=>!i.done);
  if(!pending.length)return;
  const items=pending.map(i=>`• ${i.name}`);
  if(swRegistration?.active){
    swRegistration.active.postMessage({type:'NOTIFY_NEARBY',listName:list.name,listEmoji:list.emoji,placeName,items});
  } else if(Notification.permission==='granted'){
    new Notification(`${list.emoji} ${list.name} cerca`,{body:`📍 ${placeName}\n${items.slice(0,3).join('\n')}`,tag:`lalistita-${list.id}`,renotify:true});
  }
}

// ── INSTALL PROMPT ──
let deferredInstallPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredInstallPrompt=e;showInstallBanner();});
function showInstallBanner(){
  if(document.getElementById('install-banner'))return;
  const b=document.createElement('div');
  b.id='install-banner';
  b.style.cssText=`position:fixed;bottom:16px;left:16px;right:16px;background:var(--ink);color:var(--paper);border-radius:4px;padding:13px 15px;display:flex;align-items:center;gap:10px;z-index:500;box-shadow:0 4px 20px rgba(0,0,0,.2);font-family:'JetBrains Mono',monospace;animation:toastIn .25s ease`;
  b.innerHTML=`<div style="flex:1"><div style="font-size:0.78rem;font-weight:600;color:#e8dfc8;margin-bottom:2px">instalar lalistita</div><div style="font-size:0.7rem;color:#8a8070">agregala a tu pantalla de inicio</div></div><button onclick="installApp()" style="background:var(--paper);color:var(--ink);border:none;border-radius:3px;padding:6px 11px;font-family:'JetBrains Mono',monospace;font-size:0.75rem;cursor:pointer">instalar</button><button onclick="document.getElementById('install-banner').remove()" style="background:none;border:none;color:#8a8070;cursor:pointer;font-size:1rem">✕</button>`;
  document.body.appendChild(b);
}
async function installApp(){
  if(!deferredInstallPrompt)return;
  deferredInstallPrompt.prompt();
  const{outcome}=await deferredInstallPrompt.userChoice;
  deferredInstallPrompt=null;
  document.getElementById('install-banner')?.remove();
  if(outcome==='accepted')showToast('🎉','instalada','lalistita ya está en tu pantalla de inicio',4000);
}
window.addEventListener('appinstalled',()=>showToast('🎉','listo','lalistita instalada correctamente',4000));
